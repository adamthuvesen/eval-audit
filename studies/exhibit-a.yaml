# Exhibit A — GAIA HAL Generalist Agent: Claude 3.7 Sonnet vs o4-mini High
# Locked claim consumes scouting/exhibit-a-decision.md verbatim.
# DO NOT edit `treatment`, `control`, `outcome`, `harness`, or `benchmark`
# without first updating the scouting decision document and explaining why.

id: exhibit-a
benchmark: gaia
analysis_mode: declared_reanalysis
data_observation: summary_seen
harness: hal_generalist_agent

primary_outcome:
  name: success_rate
  unit: task
  direction: higher_is_better

# Agent IDs are the verbatim long-form values from the locked GAIA column
# mapping (scouting/exhibit-a-decision.md). The HAL fixture's `agent_id` raw
# column passes through to RunRecord.agent_id without renaming, so studies
# must use the same string. The shorter `agent_short` column lives only in
# rerun_metadata for human readability.
agents:
  - id: "HAL Generalist Agent (claude-3-7-sonnet-20250219)"
  - id: "HAL Generalist Agent (o4-mini-2025-04-16 high)"

design:
  task_sampling: fixed_public_validation_set
  run_strategy: observed_public_runs
  observed_runs_per_agent: 1
  rerun_policy: recommend_if_decision_sensitive

inference:
  alpha: 0.05
  correction_method: holm_bonferroni
  comparison_family: declared_claims
  target_mde: 0.03

cost:
  metrics:
    - reconstructed_per_task_cost_usd
    - reported_run_total_cost_usd
    - cost_per_success_usd
  primary_view: pareto_frontier

claims:
  - id: claude37_vs_o4mini_high_on_gaia
    text: >-
      On GAIA validation under the HAL Generalist agent harness, Claude 3.7
      Sonnet (56.4%) outperforms o4-mini High (54.5%) by 1.9 percentage points
      while costing 2.2x more ($130.68 vs $59.39). This reanalysis evaluates
      whether that 1.9 pp accuracy advantage is statistically distinguishable
      from noise on n=165, and whether it is decision-relevant given the cost
      gap.
    treatment: "HAL Generalist Agent (claude-3-7-sonnet-20250219)"
    control: "HAL Generalist Agent (o4-mini-2025-04-16 high)"
    outcome: success_rate
