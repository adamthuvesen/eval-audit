name: CI

on:
  push:
  pull_request:

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check (pytest + ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # NOTE on action pinning: the steps below pin to major version tags. For
    # supply-chain hygiene we should pin each `uses:` to a commit SHA. The
    # safest path is to enable Dependabot for `github-actions` once this
    # workflow lands, then accept its first SHA-pinning PR. Doing so manually
    # without verifying SHAs against upstream releases risks a broken workflow.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      # Single source of truth: the workflow MUST invoke `make check` directly
      # rather than re-implementing its steps. If `make check` changes (adds
      # type-checking, security scan, etc.), CI must follow without workflow
      # edits. See openspec/specs/release-engineering/spec.md.
      - name: Run make check
        run: make check
