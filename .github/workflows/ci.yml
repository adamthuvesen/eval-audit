name: CI

on:
  push:
  pull_request:

# Default to read-only for the workflow token. Jobs that need write
# permissions must opt in explicitly. This blocks an upstream-action
# compromise from mutating the repo or its issues/PRs.
permissions:
  contents: read

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check (ruff + format + pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Actions are pinned to immutable commit SHAs (not major-version tags)
      # so an upstream tag move or maintainer-account compromise cannot
      # silently change what runs in CI. Dependabot (.github/dependabot.yml)
      # opens weekly bump PRs against these pins; review and merge those PRs
      # rather than editing the SHAs by hand.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6.8.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      # Single source of truth: the workflow MUST invoke `make check` directly
      # rather than re-implementing its steps. If `make check` changes (adds
      # type-checking, security scan, etc.), CI must follow without workflow
      # edits.
      - name: Run make check
        run: make check
